name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offchain:
    name: Offchain Type-Check + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: offchain/package-lock.json

      - name: Install dependencies
        working-directory: offchain
        run: npm ci

      - name: Type check (ignoring third-party ox errors)
        working-directory: offchain
        run: npm run type-check -- --skipLibCheck 2>&1 | grep -v 'node_modules/ox' | grep 'error TS' && exit 1 || true

      - name: Run tests
        working-directory: offchain
        run: npx jest --no-coverage --ci --forceExit
        env:
          NODE_ENV: test

  docs-check:
    name: Docs Freshness Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/docs/package-lock.json

      - name: Install docs pipeline deps
        working-directory: tools/docs
        run: npm ci

      - name: Run docs:check
        working-directory: tools/docs
        run: npx tsx src/check.ts

      - name: Run docs pipeline tests
        working-directory: tools/docs
        run: npx jest --no-coverage --ci --forceExit
