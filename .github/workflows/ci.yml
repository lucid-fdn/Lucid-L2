name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offchain:
    name: Offchain Type-Check + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: offchain/package-lock.json

      - name: Install dependencies
        working-directory: offchain
        run: npm ci

      - name: Type check
        working-directory: offchain
        run: npm run type-check -- --skipLibCheck

      - name: Run tests
        working-directory: offchain
        run: npm test -- --ci --forceExit
        env:
          NODE_ENV: test

  sdk-build:
    name: SDK Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: offchain/package-lock.json

      - name: Install dependencies
        working-directory: offchain
        run: npm ci

      - name: Build SDK
        working-directory: offchain/packages/sdk
        run: npx tsup

