# =============================================================================
# Components
# =============================================================================
components:
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Lucid API key (lk_live_... or lk_test_...)

  schemas:
    # =========================================================================
    # Passport schemas
    # =========================================================================
    PassportType:
      type: string
      enum: [model, compute, tool, dataset, agent, voice, other]
    PassportStatus:
      type: string
      enum: [active, deprecated, revoked]

    Passport:
      type: object
      required: [passport_id, type, owner, status, created_at, updated_at]
      properties:
        passport_id: { type: string }
        type: { $ref: '#/components/schemas/PassportType' }
        owner: { type: string }
        name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        version: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
          nullable: true
        status: { $ref: '#/components/schemas/PassportStatus' }
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        metadata_hash: { type: string, nullable: true }
        depin_metadata_cid: { type: string, nullable: true, description: 'DePIN storage CID for metadata' }
        depin_provider: { type: string, nullable: true, description: 'DePIN provider used (arweave, lighthouse, mock)' }
        nft_mint: { type: string, nullable: true, description: 'NFT mint address (Solana base58 or EVM 0x)' }
        nft_chain: { type: string, nullable: true, description: 'Chain where NFT was minted' }
        share_token_mint: { type: string, nullable: true, description: 'Share token SPL mint address' }
        created_at: { type: integer }
        updated_at: { type: integer }
        on_chain:
          type: object
          nullable: true
          properties:
            pda: { type: string, nullable: true }
            tx: { type: string, nullable: true }
            synced_at: { type: integer, nullable: true }

    CreatePassportRequest:
      type: object
      required: [type, owner, metadata]
      properties:
        type: { $ref: '#/components/schemas/PassportType' }
        owner: { type: string }
        metadata:
          type: object
          additionalProperties: true
        name: { type: string }
        description: { type: string }
        version: { type: string }
        tags:
          type: array
          items: { type: string }

    UpdatePassportRequest:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties: true
        name: { type: string }
        description: { type: string }
        version: { type: string }
        tags:
          type: array
          items: { type: string }
        status: { $ref: '#/components/schemas/PassportStatus' }

    CreatePassportResponse:
      type: object
      required: [success, passport_id, passport]
      properties:
        success: { type: boolean }
        passport_id: { type: string }
        passport: { $ref: '#/components/schemas/Passport' }

    GetPassportResponse:
      type: object
      required: [success, passport]
      properties:
        success: { type: boolean }
        passport: { $ref: '#/components/schemas/Passport' }

    ListPassportsResponse:
      type: object
      required: [success, passports, pagination]
      properties:
        success: { type: boolean }
        passports:
          type: array
          items: { $ref: '#/components/schemas/Passport' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    Pagination:
      type: object
      required: [total, page, per_page, total_pages]
      properties:
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        total_pages: { type: integer }

    # =========================================================================
    # Policy
    # =========================================================================
    Policy:
      type: object
      required: [policy_version]
      additionalProperties: false
      properties:
        policy_version: { type: string, description: "Policy schema version, e.g. '1.0'" }
        allow_regions:
          type: array
          items: { type: string }
        residency_required: { type: boolean }
        attestation:
          type: object
          additionalProperties: false
          properties:
            attestation_required: { type: boolean }
            require_cc_on: { type: boolean }
            fallback_allowed: { type: boolean }
        latency:
          type: object
          additionalProperties: false
          properties:
            p95_ms_budget: { type: integer }
            hard_timeout_ms: { type: integer }
        cost:
          type: object
          additionalProperties: false
          properties:
            max_price_per_1k_tokens_usd: { type: number }
            spot_only: { type: boolean }
        privacy:
          type: object
          additionalProperties: false
          properties:
            store_inputs: { type: boolean }
            redact_pii: { type: boolean }

    # =========================================================================
    # ComputeMeta / ModelMeta schemas  (mirror schemas/*.schema.json)
    # =========================================================================
    ComputeHardware:
      type: object
      required: [gpu, vram_gb]
      properties:
        gpu: { type: string, description: "GPU model (e.g. 'NVIDIA-A100-40GB')" }
        vram_gb: { type: integer, minimum: 0, description: GPU VRAM in gigabytes }
        arch: { type: string, description: "GPU architecture (e.g. 'ampere', 'hopper')" }
        gpu_count: { type: integer, minimum: 1, default: 1 }
        cpu_cores: { type: integer, minimum: 1 }
        memory_gb: { type: integer, minimum: 1, description: System RAM in gigabytes }

    ComputeRuntime:
      type: object
      required: [name]
      properties:
        name:
          type: string
          enum: [vllm, tgi, tensorrt, hf-inference-api, openai-compatible, custom]
        version: { type: string }
        image: { type: string, description: Docker image reference }

    ComputeCapabilities:
      type: object
      properties:
        supports_streaming: { type: boolean, default: true }
        supports_attestation: { type: boolean, default: false }
        supports_cc_on: { type: boolean, default: false }
        inference_types:
          type: array
          items:
            type: string
            enum: [text-generation, chat-completion, embeddings, image-generation, speech-to-text]

    ComputeEndpoints:
      type: object
      required: [inference_url]
      properties:
        inference_url: { type: string, description: URL for inference requests }
        quote_url: { type: string, format: uri }
        jobs_url: { type: string, format: uri }
        health_url: { type: string, format: uri }
        metrics_url: { type: string, format: uri }

    ComputeWorker:
      type: object
      required: [worker_id, status]
      properties:
        worker_id: { type: string }
        status:
          type: string
          enum: [online, offline, degraded, draining]
        last_heartbeat: { type: integer, description: Unix timestamp of last heartbeat }

    ComputeMeta:
      type: object
      description: >-
        Metadata for a compute provider passport.
        Validated against schemas/ComputeMeta.schema.json (additionalProperties: false).
      required: [schema_version, compute_passport_id, provider_type, regions, hardware, runtimes, endpoints]
      properties:
        schema_version: { type: string, enum: ['1.0'] }
        compute_passport_id: { type: string, minLength: 10 }
        provider_type:
          type: string
          enum: [depin, cloud, onprem, managed]
        execution_mode:
          type: string
          enum: [byo_runtime, managed_endpoint]
        operator_pubkey:
          type: string
          pattern: '^[a-f0-9]{64}$'
          description: ed25519 public key (hex) of the provider operator
        regions:
          type: array
          items: { type: string }
          minItems: 1
        residency_supported: { type: boolean, default: false }
        hardware: { $ref: '#/components/schemas/ComputeHardware' }
        gpu_fingerprint:
          type: string
          nullable: true
          description: "GPU hardware fingerprint. Must be null for managed_endpoint mode."
        runtime_hash:
          type: string
          nullable: true
          pattern: '^sha256:[a-f0-9]{64}$'
          description: "Docker image digest. Must be null for managed_endpoint mode."
        runtimes:
          type: array
          items: { $ref: '#/components/schemas/ComputeRuntime' }
          minItems: 1
        capabilities: { $ref: '#/components/schemas/ComputeCapabilities' }
        network:
          type: object
          properties:
            p95_ms_estimate: { type: integer, minimum: 0 }
            bandwidth: { type: string }
        limits:
          type: object
          properties:
            max_context: { type: integer, minimum: 0 }
            max_batch: { type: integer, minimum: 0 }
            max_input_tokens: { type: integer, minimum: 1 }
            max_output_tokens: { type: integer, minimum: 1 }
            requests_per_minute: { type: integer, minimum: 1 }
        pricing:
          type: object
          properties:
            price_per_1k_tokens_estimate: { type: number, minimum: 0 }
            price_per_minute_estimate: { type: number, minimum: 0 }
            per_input_token: { type: number, minimum: 0 }
            per_output_token: { type: number, minimum: 0 }
            currency:
              type: string
              enum: [lamports, usd_cents, credits]
        endpoints: { $ref: '#/components/schemas/ComputeEndpoints' }
        workers:
          type: array
          items: { $ref: '#/components/schemas/ComputeWorker' }
        sla:
          type: object
          properties:
            tier:
              type: string
              enum: [best-effort, standard, premium, enterprise]
            uptime_target: { type: number, minimum: 0, maximum: 100 }
        policy_tags:
          type: array
          items: { type: string }
          description: "Tags for matching (e.g. 'hipaa', 'gdpr', 'no-logging')"
        metadata:
          type: object
          additionalProperties: true

    ModelRequirements:
      type: object
      properties:
        min_vram_gb: { type: integer, minimum: 0 }
        gpu_classes:
          type: array
          items: { type: string }
        cuda_min: { type: string }

    ModelMeta:
      type: object
      description: >-
        Metadata for a model passport.
        Validated against schemas/ModelMeta.schema.json (additionalProperties: false).
      required: [schema_version, model_passport_id, format, runtime_recommended]
      properties:
        schema_version: { type: string, enum: ['1.0'] }
        model_passport_id: { type: string, minLength: 10 }
        format:
          type: string
          enum: [safetensors, gguf, api]
        runtime_recommended:
          type: string
          enum: [vllm, tgi, tensorrt, trustgate, openai]
        name: { type: string }
        description: { type: string }
        provider: { type: string, description: "Provider name (e.g. trustgate, openai)" }
        base:
          type: string
          enum: [hf, openai, anthropic, google, cohere, custom_endpoint]
          default: hf
        hf:
          type: object
          properties:
            repo_id: { type: string }
            revision: { type: string }
        context_length: { type: integer, minimum: 1 }
        quantizations:
          type: array
          items:
            type: string
            enum: [fp16, int8, awq, gptq, gguf_q4]
        requirements: { $ref: '#/components/schemas/ModelRequirements' }
        endpoints:
          type: object
          properties:
            openai_compat_base_url: { type: string }
            auth_mode:
              type: string
              enum: [byok, lucid_key, none]
              default: none
        artifacts:
          type: array
          items: { type: string }
        weights_uri: { type: string }
        weights_hash: { type: string }

    # =========================================================================
    # Chat / Inference schemas
    # =========================================================================
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, function]
        content: { type: string }
        name: { type: string }
        function_call:
          type: object
          properties:
            name: { type: string }
            arguments: { type: string }

    InferenceRequest:
      type: object
      properties:
        model_passport_id: { type: string }
        model: { type: string }
        prompt: { type: string }
        messages:
          type: array
          items: { $ref: '#/components/schemas/ChatMessage' }
        max_tokens: { type: integer }
        temperature: { type: number }
        top_p: { type: number }
        top_k: { type: integer }
        stop:
          type: array
          items: { type: string }
        stream: { type: boolean }
        policy: { $ref: '#/components/schemas/Policy' }
        compute_passport_id: { type: string }
        trace_id: { type: string }
        request_id: { type: string }

    InferenceResult:
      type: object
      required: [success, run_id, tokens_in, tokens_out, ttft_ms, total_latency_ms, model_passport_id, compute_passport_id, runtime]
      properties:
        success: { type: boolean }
        run_id: { type: string }
        request_id: { type: string }
        trace_id: { type: string }
        text: { type: string }
        finish_reason: { type: string }
        tokens_in: { type: integer }
        tokens_out: { type: integer }
        ttft_ms: { type: integer }
        total_latency_ms: { type: integer }
        model_passport_id: { type: string }
        compute_passport_id: { type: string }
        runtime: { type: string }
        policy_hash: { type: string }
        receipt_id: { type: string }
        used_fallback: { type: boolean }
        fallback_reason: { type: string }
        error: { type: string }
        error_code: { type: string }

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items: { $ref: '#/components/schemas/ChatMessage' }
        max_tokens: { type: integer }
        temperature: { type: number }
        top_p: { type: number }
        stop:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        stream: { type: boolean }
        policy: { $ref: '#/components/schemas/Policy' }
        trace_id: { type: string }

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices, usage]
      properties:
        id: { type: string }
        object: { type: string }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message: { $ref: '#/components/schemas/ChatMessage' }
              finish_reason: { type: string, nullable: true }
        usage:
          type: object
          required: [prompt_tokens, completion_tokens, total_tokens]
          properties:
            prompt_tokens: { type: integer }
            completion_tokens: { type: integer }
            total_tokens: { type: integer }

    # =========================================================================
    # Error
    # =========================================================================
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean }
        error: { type: string }
        message: { type: string }
        error_code: { type: string }
        details: {}

    # =========================================================================
    # Compute
    # =========================================================================
    ComputeHeartbeat:
      type: object
      required: [compute_passport_id, status]
      properties:
        compute_passport_id: { type: string }
        status:
          type: string
          enum: [healthy, degraded, down]
        queue_depth: { type: integer }
        price_per_1k_tokens_estimate: { type: number }
        p95_ms_estimate: { type: number }

    # =========================================================================
    # Receipt schemas
    # =========================================================================
    Receipt:
      type: object
      required: [run_id, model_passport_id, compute_passport_id, policy_hash, runtime, timestamp, receipt_hash, receipt_signature, signer_pubkey, signer_type, metrics]
      properties:
        schema_version: { type: string }
        run_id: { type: string }
        model_passport_id: { type: string }
        compute_passport_id: { type: string }
        policy_hash: { type: string }
        runtime: { type: string }
        timestamp: { type: integer }
        trace_id: { type: string }
        image_hash: { type: string }
        model_hash: { type: string }
        attestation: { type: object, additionalProperties: true }
        execution_mode: { type: string }
        job_hash: { type: string }
        quote_hash: { type: string }
        node_id: { type: string }
        runtime_hash: { type: string, nullable: true }
        gpu_fingerprint: { type: string, nullable: true }
        outputs_hash: { type: string }
        output_ref: { type: string }
        start_ts: { type: integer }
        end_ts: { type: integer }
        input_ref: { type: string }
        error_code: { type: string }
        error_message: { type: string }
        metrics:
          type: object
          required: [ttft_ms, tokens_in, tokens_out]
          properties:
            ttft_ms: { type: integer }
            tokens_in: { type: integer }
            tokens_out: { type: integer }
            p95_ms: { type: integer }
            total_latency_ms: { type: integer }
            queue_wait_ms: { type: integer }
            queue_time_ms: { type: integer }
            cold_start_ms: { type: integer }
            model_load_ms: { type: integer }
            cache_hit: { type: boolean }
        receipt_hash: { type: string }
        receipt_signature: { type: string }
        signer_pubkey: { type: string }
        signer_type:
          type: string
          enum: [orchestrator, compute, worker]
        _mmr_leaf_index: { type: integer }
        anchor:
          type: object
          nullable: true
          properties:
            chain: { type: string }
            tx: { type: string }
            root: { type: string }
            epoch_id: { type: string }

    CreateReceiptRequest:
      type: object
      description: Input fields for creating a receipt. The backend computes the hash, signature, and wraps metrics.
      required: [model_passport_id, compute_passport_id, policy_hash, runtime, tokens_in, tokens_out, ttft_ms]
      properties:
        model_passport_id: { type: string }
        compute_passport_id: { type: string }
        policy_hash: { type: string }
        runtime: { type: string }
        tokens_in: { type: integer }
        tokens_out: { type: integer }
        ttft_ms: { type: integer }
        total_latency_ms: { type: integer }
        timestamp: { type: integer }
        trace_id: { type: string }
        run_id: { type: string }
        image_hash: { type: string }
        model_hash: { type: string }
        attestation: { type: object, additionalProperties: true }
        execution_mode: { type: string }
        node_id: { type: string }
        runtime_hash: { type: string }
        gpu_fingerprint: { type: string }

    ReceiptProof:
      type: object
      required: [run_id, receipt_hash, leaf_index, proof, root]
      properties:
        run_id: { type: string }
        receipt_hash: { type: string }
        leaf: { type: string, description: 'The leaf hash (receipt_hash) at leaf_index' }
        leaf_index: { type: integer }
        proof:
          type: array
          items: { type: string }
          description: Sibling hashes along the Merkle path
        root: { type: string }
        directions:
          type: array
          items:
            type: string
            enum: ['L', 'R']
          description: Direction of each sibling (L = sibling is on left, R = on right).

    ReceiptVerification:
      type: object
      properties:
        success: { type: boolean }
        valid: { type: boolean }
        hash_valid: { type: boolean }
        signature_valid: { type: boolean }
        inclusion_valid: { type: boolean }
        expected_hash: { type: string }
        computed_hash: { type: string }
        merkle_root: { type: string }

    ReceiptHashVerification:
      type: object
      required: [success, verified, receipt_hash]
      properties:
        success: { type: boolean }
        verified: { type: boolean }
        receipt_hash: { type: string }
        run_id: { type: string }
        hash_valid: { type: boolean }
        signature_valid: { type: boolean }
        signer_pubkey: { type: string }
        signer_type: { type: string }
        execution_mode: { type: string }
        runtime_hash: { type: string }
        gpu_fingerprint: { type: string }
        inclusion_proof:
          type: object
          nullable: true
          properties:
            leaf_index: { type: integer }
            proof:
              type: array
              items: { type: string }
            root: { type: string }
            directions:
              type: array
              items: { type: string }
        inclusion_valid: { type: boolean }
        epoch:
          type: object
          nullable: true
          properties:
            epoch_id: { type: string }
            mmr_root: { type: string }
            chain_tx: { type: string }
            finalized_at: { type: integer }
        on_chain_verified: { type: boolean }
        tx_signature: { type: string, nullable: true }

    # =========================================================================
    # Epoch schemas
    # =========================================================================
    Epoch:
      type: object
      required: [epoch_id, mmr_root, leaf_count, created_at, status]
      properties:
        epoch_id: { type: string }
        project_id: { type: string }
        mmr_root: { type: string }
        leaf_count: { type: integer }
        created_at: { type: integer }
        finalized_at: { type: integer }
        status:
          type: string
          enum: [open, anchoring, anchored, failed]
        chain_tx: { type: string }
        error: { type: string }
        start_leaf_index: { type: integer }
        end_leaf_index: { type: integer }

    EpochStatsResponse:
      type: object
      required: [success, stats]
      properties:
        success: { type: boolean }
        stats:
          type: object
          properties:
            total_epochs: { type: integer }
            total_receipts: { type: integer }
            by_status:
              type: object
              properties:
                open: { type: integer }
                anchoring: { type: integer }
                anchored: { type: integer }
                failed: { type: integer }
            avg_receipts_per_epoch: { type: number }
            last_anchor_time: { type: integer }

    EpochsReadyResponse:
      type: object
      required: [success, count, epochs]
      properties:
        success: { type: boolean }
        count: { type: integer }
        epochs:
          type: array
          items:
            type: object
            properties:
              epoch_id: { type: string }
              project_id: { type: string }
              leaf_count: { type: integer }
              created_at: { type: integer }
              mmr_root: { type: string }

    # =========================================================================
    # Payout schemas
    # =========================================================================
    PayoutCalculateRequest:
      type: object
      required: [run_id, total_amount_lamports, compute_wallet]
      properties:
        run_id: { type: string }
        total_amount_lamports:
          oneOf:
            - type: string
            - type: integer
        compute_wallet: { type: string }
        model_wallet: { type: string }
        orchestrator_wallet: { type: string }
        config:
          $ref: '#/components/schemas/PayoutConfig'

    PayoutFromReceiptRequest:
      type: object
      required: [run_id, tokens_in, tokens_out, price_per_1k_tokens_lamports, compute_wallet]
      properties:
        run_id: { type: string }
        tokens_in: { type: integer }
        tokens_out: { type: integer }
        price_per_1k_tokens_lamports:
          oneOf:
            - type: string
            - type: integer
        compute_wallet: { type: string }
        model_wallet: { type: string }
        orchestrator_wallet: { type: string }
        config:
          $ref: '#/components/schemas/PayoutConfig'

    PayoutConfig:
      type: object
      description: Payout split configuration (basis points, must sum to 10000)
      properties:
        compute_bp:
          type: integer
          description: Basis points for compute provider (e.g., 7000 = 70%)
          minimum: 0
          maximum: 10000
        model_bp:
          type: integer
          description: Basis points for model owner (e.g., 2000 = 20%)
          minimum: 0
          maximum: 10000
        orchestrator_bp:
          type: integer
          description: Basis points for orchestrator (e.g., 1000 = 10%)
          minimum: 0
          maximum: 10000

    Payout:
      type: object
      required: [run_id, total_amount_lamports, recipients, payout_hash, timestamp]
      properties:
        run_id: { type: string }
        total_amount_lamports: { type: string, description: BigInt serialized as string }
        recipients:
          type: array
          items: { $ref: '#/components/schemas/PayoutRecipient' }
        payout_hash: { type: string }
        timestamp: { type: integer }

    PayoutRecipient:
      type: object
      required: [role, wallet, bp, amount_lamports]
      properties:
        role: { type: string }
        wallet: { type: string }
        bp: { type: integer }
        amount_lamports: { type: string, description: BigInt serialized as string }

    PassportStatsResponse:
      type: object
      required: [success, stats]
      properties:
        success: { type: boolean }
        stats:
          type: object
          required: [total, by_type, by_status]
          properties:
            total: { type: integer }
            by_type:
              type: object
              properties:
                model: { type: integer }
                compute: { type: integer }
                tool: { type: integer }
                dataset: { type: integer }
                agent: { type: integer }
            by_status:
              type: object
              properties:
                active: { type: integer }
                deprecated: { type: integer }
                revoked: { type: integer }

    # =========================================================================
    # Health schemas
    # =========================================================================
    HealthCheckResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, down]
        latency: { type: number }
        error: { type: string }
        details: { type: object, additionalProperties: true }

    SystemHealth:
      type: object
      required: [status, timestamp, uptime, version, dependencies]
      properties:
        status:
          type: string
          enum: [healthy, degraded, down]
        timestamp: { type: string, format: date-time }
        uptime: { type: number }
        version: { type: string }
        dependencies:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/HealthCheckResult'

    # =========================================================================
    # Agent schemas
    # =========================================================================
    AgentInitRequest:
      type: object
      required: [agentId]
      properties:
        agentId: { type: string }
        depinCid: { type: string }

    AgentEpochRequest:
      type: object
      required: [agentId, vectors]
      properties:
        agentId: { type: string }
        vectors:
          type: array
          items: { type: string }
          minItems: 1
        epochNumber: { type: integer }

    AgentBatchEpochsRequest:
      type: object
      required: [epochs]
      properties:
        epochs:
          type: array
          items:
            type: object
            required: [agentId, vectors]
            properties:
              agentId: { type: string }
              vectors:
                type: array
                items: { type: string }
                minItems: 1
              epochNumber: { type: integer }

    AgentProofRequest:
      type: object
      required: [agentId, vectorText, epochNumber]
      properties:
        agentId: { type: string }
        vectorText: { type: string }
        epochNumber: { type: integer }

    AgentStats:
      type: object
      properties:
        agentId: { type: string }
        totalEpochs: { type: integer }
        totalVectors: { type: integer }
        currentRoot: { type: string }
        lastEpoch: { type: integer }
        createdAt: { type: string, format: date-time }

    AgentHistoryEntry:
      type: object
      properties:
        epoch: { type: integer }
        root: { type: string }
        timestamp: { type: integer }
        date: { type: string, format: date-time }

    GasCost:
      type: object
      required: [iGas, mGas, total]
      properties:
        iGas: { type: integer }
        mGas: { type: integer }
        total: { type: integer }

    AgentPlanRequest:
      type: object
      required: [goal]
      properties:
        goal: { type: string }
        context: { type: object, additionalProperties: true }
        constraints:
          type: array
          items: { type: string }
        autoExecute: { type: boolean }

    AgentAccomplishRequest:
      type: object
      required: [goal]
      properties:
        goal: { type: string }
        context: { type: object, additionalProperties: true }
        preferredExecutor:
          type: string
          enum: [n8n, langgraph]
        dryRun: { type: boolean }

    # =========================================================================
    # Share Token schemas
    # =========================================================================
    TokenLaunchRequest:
      type: object
      required: [name, symbol, totalSupply]
      properties:
        name: { type: string, description: 'Token name (e.g., "Llama 3.1 Share")' }
        symbol: { type: string, description: 'Token symbol (e.g., "LLAMA")' }
        totalSupply: { type: integer, minimum: 1, description: 'Total token supply' }
        decimals: { type: integer, minimum: 0, maximum: 18, default: 6, description: 'Token decimals' }

    TokenLaunchResponse:
      type: object
      required: [success, mint, txSignature, totalSupply, provider]
      properties:
        success: { type: boolean }
        mint: { type: string, description: 'SPL token mint address' }
        txSignature: { type: string, description: 'Transaction signature' }
        totalSupply: { type: integer }
        provider: { type: string, description: 'Token launcher provider used' }

    TokenInfo:
      type: object
      required: [success, mint, passportId, name, symbol, totalSupply, decimals]
      properties:
        success: { type: boolean }
        mint: { type: string, description: 'SPL token mint address' }
        passportId: { type: string }
        name: { type: string }
        symbol: { type: string }
        totalSupply: { type: integer }
        decimals: { type: integer }
        holders: { type: integer, description: 'Number of unique token holders' }

    AirdropRequest:
      type: object
      required: [amountLamports]
      properties:
        amountLamports: { type: integer, minimum: 1, description: 'SOL amount in lamports to distribute' }

    AirdropResponse:
      type: object
      required: [success, passportId, tokenMint, totalDistributed, holders, distributions, txSignatures]
      properties:
        success: { type: boolean }
        passportId: { type: string }
        tokenMint: { type: string }
        totalDistributed: { type: integer, description: 'Total lamports distributed' }
        holders: { type: integer, description: 'Number of holders who received airdrop' }
        distributions:
          type: array
          items:
            type: object
            properties:
              holder: { type: string }
              balance: { type: number }
              share: { type: number }
              amountLamports: { type: integer }
        txSignatures:
          type: array
          items: { type: string }

    # =========================================================================
    # v2 Escrow
    # =========================================================================
    EscrowStatus:
      type: string
      enum: [Created, Released, Refunded, Disputed]

    CreateEscrowRequest:
      type: object
      required: [chainId, beneficiary, token, amount, duration]
      properties:
        chainId: { type: string, description: "Chain identifier (e.g. 'base', 'ethereum-sepolia')" }
        beneficiary: { type: string, description: "Beneficiary address" }
        token: { type: string, description: "ERC-20 token address" }
        amount: { type: string, description: "Amount in token base units" }
        duration: { type: integer, description: "Escrow duration in seconds" }
        expectedReceiptHash: { type: string, description: "Optional expected receipt hash for auto-release" }

    ReleaseEscrowRequest:
      type: object
      required: [chainId, escrowId, receiptHash, signature, signerPubkey]
      properties:
        chainId: { type: string }
        escrowId: { type: string }
        receiptHash: { type: string }
        signature: { type: string }
        signerPubkey: { type: string }

    DisputeEscrowRequest:
      type: object
      required: [chainId, escrowId, reason]
      properties:
        chainId: { type: string }
        escrowId: { type: string }
        reason: { type: string }

    EscrowInfo:
      type: object
      properties:
        escrowId: { type: string }
        depositor: { type: string }
        beneficiary: { type: string }
        token: { type: string }
        amount: { type: string }
        createdAt: { type: string }
        expiresAt: { type: string }
        expectedReceiptHash: { type: string }
        status: { $ref: '#/components/schemas/EscrowStatus' }

    GetEscrowResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        escrow: { $ref: '#/components/schemas/EscrowInfo' }

    # =========================================================================
    # v2 Disputes
    # =========================================================================
    DisputeStatus:
      type: string
      enum: [Open, EvidencePhase, Resolved, Appealed]

    OpenDisputeRequest:
      type: object
      required: [chainId, escrowId, reason]
      properties:
        chainId: { type: string }
        escrowId: { type: string }
        reason: { type: string }

    SubmitEvidenceRequest:
      type: object
      required: [chainId]
      properties:
        chainId: { type: string }
        receiptHash: { type: string }
        mmrRoot: { type: string }
        mmrProof: { type: string }
        description: { type: string }

    DisputeInfo:
      type: object
      properties:
        disputeId: { type: string }
        escrowId: { type: string }
        status: { $ref: '#/components/schemas/DisputeStatus' }
        reason: { type: string }
        createdAt: { type: string }
        resolvedAt: { type: string }
        resolution: { type: string }

    GetDisputeResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        dispute: { $ref: '#/components/schemas/DisputeInfo' }

    # =========================================================================
    # v2 Paymaster
    # =========================================================================
    SponsorUserOpRequest:
      type: object
      required: [chainId, userOp]
      properties:
        chainId: { type: string }
        userOp:
          type: object
          description: ERC-4337 UserOperation struct

    EstimateGasRequest:
      type: object
      required: [chainId, userOp]
      properties:
        chainId: { type: string }
        userOp:
          type: object
          description: ERC-4337 UserOperation struct

    PaymasterRateResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        exchangeRate: { type: number, description: "LUCID per ETH rate" }
        chainId: { type: string }

    # =========================================================================
    # v2 Identity
    # =========================================================================
    LinkIdentityRequest:
      type: object
      required: [primaryCaip10, linkedCaip10]
      properties:
        primaryCaip10: { type: string, description: "Primary CAIP-10 address" }
        linkedCaip10: { type: string, description: "Address to link" }
        proof: { type: string, description: "Optional ownership proof" }

    ResolveIdentityRequest:
      type: object
      required: [caip10]
      properties:
        caip10: { type: string }

    UnlinkIdentityRequest:
      type: object
      required: [primaryCaip10, linkedCaip10]
      properties:
        primaryCaip10: { type: string }
        linkedCaip10: { type: string }

    IdentityLink:
      type: object
      properties:
        linkId: { type: string }
        primaryCaip10: { type: string }
        linkedCaip10: { type: string }
        createdAt: { type: string }

    IdentityLinkResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        link: { $ref: '#/components/schemas/IdentityLink' }

    IdentityChainsResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        caip10: { type: string }
        chains:
          type: array
          items: { type: string }

    # =========================================================================
    # v2 TBA (Token Bound Accounts)
    # =========================================================================
    CreateTBARequest:
      type: object
      required: [chainId, tokenContract, tokenId]
      properties:
        chainId: { type: string }
        tokenContract: { type: string, description: "NFT contract address" }
        tokenId: { type: string, description: "NFT token ID" }

    TBAInfo:
      type: object
      properties:
        address: { type: string, description: "TBA contract address" }
        chainId: { type: string }
        tokenContract: { type: string }
        tokenId: { type: string }

    GetTBAResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        tba: { $ref: '#/components/schemas/TBAInfo' }

    # =========================================================================
    # v2 ERC-7579 Modules
    # =========================================================================
    InstallModuleRequest:
      type: object
      required: [chainId, account, moduleType, moduleAddress]
      properties:
        chainId: { type: string }
        account: { type: string, description: "Smart account address" }
        moduleType: { type: string, description: "Module type (validator, executor)" }
        moduleAddress: { type: string, description: "Module contract address" }
        initData: { type: string, description: "Optional init calldata (hex)" }

    UninstallModuleRequest:
      type: object
      required: [chainId, account, moduleType, moduleAddress]
      properties:
        chainId: { type: string }
        account: { type: string }
        moduleType: { type: string }
        moduleAddress: { type: string }

    ConfigurePolicyRequest:
      type: object
      required: [chainId, account, policyHashes]
      properties:
        chainId: { type: string }
        account: { type: string }
        policyHashes:
          type: array
          items: { type: string }

    ConfigurePayoutRequest:
      type: object
      required: [chainId, account, recipients, basisPoints]
      properties:
        chainId: { type: string }
        account: { type: string }
        recipients:
          type: array
          items: { type: string }
        basisPoints:
          type: array
          items: { type: integer }
          description: "Must sum to 10000"

    ListModulesResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        modules: { type: object, description: "Installed modules by type" }

    # =========================================================================
    # v2 zkML
    # =========================================================================
    GenerateZkMLProofRequest:
      type: object
      required: [modelId, inputHash, outputHash, policyHash]
      properties:
        modelId: { type: string }
        inputHash: { type: string }
        outputHash: { type: string }
        policyHash: { type: string }

    VerifyZkMLProofRequest:
      type: object
      required: [chainId, proof, receiptHash]
      properties:
        chainId: { type: string }
        proof: { type: object, description: "Groth16 proof (a, b, c points)" }
        receiptHash: { type: string }

    RegisterZkMLModelRequest:
      type: object
      required: [chainId, modelHash, verifyingKey]
      properties:
        chainId: { type: string }
        modelHash: { type: string }
        verifyingKey: { type: string, description: "Groth16 verifying key (hex)" }

    ZkMLProof:
      type: object
      properties:
        proof: { type: object }
        publicInputs:
          type: array
          items: { type: string }
        modelCircuitHash: { type: string }
        verified: { type: boolean }

    ZkMLVerifyResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        valid: { type: boolean }
        stage:
          type: string
          enum: [offchain, onchain]
        error: { type: string }

    ListZkMLModelsResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        models: { type: object }

    # =========================================================================
    # Passport PATCH sub-routes
    # =========================================================================
    UpdatePassportPricingRequest:
      type: object
      properties:
        price_per_request: { type: number }
        billing_model: { type: string }
        revenue_split:
          type: object
          properties:
            compute_bps: { type: integer }
            model_bps: { type: integer }
            protocol_bps: { type: integer }

    UpdatePassportEndpointsRequest:
      type: object
      properties:
        inference_url: { type: string, format: uri }
        health_url: { type: string, format: uri }
        api_base_url: { type: string, format: uri }

    # =========================================================================
    # Shared
    # =========================================================================
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
