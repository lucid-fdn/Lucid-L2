openapi: 3.0.3
info:
  title: LucidLayer API
  version: 0.2.0
  description: |
    LucidLayer Offchain API.

    This OpenAPI spec is the source of truth for the actual backend routes.
    It is used to generate SDK clients via Speakeasy.

    Route groups:
    - `/v1/*` — Passports, Match, Run, Receipts, Epochs, Payouts, Compute
    - `/health/*` — System health and dependency checks
    - `/api/agents/*` — AI Agent MMR, Planner, and Orchestrator
servers:
  - url: https://api.lucid.foundation
    description: Production server

security:
  - BearerAuth: []
  - {}

# Speakeasy MCP tool generation configuration
x-speakeasy-mcp:
  scope-mapping:
    - pattern: "^(get|list|search)"
      scopes: [read]
    - pattern: "^(verify|check)"
      scopes: [read]
    - pattern: "^(create|update|trigger|submit|commit|retry|run|calculate|init|process|plan|accomplish|execute|validate|release|dispute|open|resolve|appeal|sponsor|estimate|link|unlink|install|uninstall|configure|prove|register|generate)"
      scopes: [write]
    - pattern: "^(delete)"
      scopes: [write, destructive]

tags:
  - name: Passports
  - name: Match
  - name: Run
  - name: Receipts
  - name: Epochs
  - name: Payouts
  - name: Compute
  - name: Health
  - name: Agents
  - name: Shares
  - name: Escrow
  - name: Disputes
  - name: Paymaster
  - name: Identity
  - name: TBA
  - name: Modules
  - name: zkML

paths:
  # ===========================================================================
  # Passports
  # ===========================================================================
  /v1/passports:
    post:
      tags: [Passports]
      operationId: lucid_create_passport
      summary: Create a passport
      x-speakeasy-mcp:
        name: lucid_create_passport
        description: Create a new passport (model/compute/tool/dataset/agent).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePassportRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePassportResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    get:
      tags: [Passports]
      operationId: lucid_list_passports
      summary: List passports
      x-speakeasy-mcp:
        name: lucid_list_passports
        description: List passports with filtering, sorting, and pagination.
      parameters:
        - in: query
          name: type
          schema:
            oneOf:
              - $ref: '#/components/schemas/PassportType'
              - type: array
                items: { $ref: '#/components/schemas/PassportType' }
        - in: query
          name: owner
          schema: { type: string }
        - in: query
          name: status
          schema:
            oneOf:
              - $ref: '#/components/schemas/PassportStatus'
              - type: array
                items: { $ref: '#/components/schemas/PassportStatus' }
        - in: query
          name: tags
          description: Comma-separated
          schema: { type: string }
        - in: query
          name: tag_match
          schema: { type: string, enum: [all, any] }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: sort_by
          schema: { type: string, enum: [created_at, updated_at, name] }
        - in: query
          name: sort_order
          schema: { type: string, enum: [asc, desc] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPassportsResponse'
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/passports/{passport_id}:
    get:
      tags: [Passports]
      operationId: lucid_get_passport
      summary: Get a passport
      x-speakeasy-mcp:
        name: lucid_get_passport
        description: Retrieve a passport by its passport_id.
      parameters:
        - in: path
          name: passport_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPassportResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Passports]
      operationId: lucid_update_passport
      summary: Update a passport
      x-speakeasy-mcp:
        name: lucid_update_passport
        description: Update an existing passport by passport_id.
      parameters:
        - in: path
          name: passport_id
          required: true
          schema: { type: string }
        - in: header
          name: X-Owner-Address
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePassportRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPassportResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Passports]
      operationId: lucid_delete_passport
      summary: Delete a passport (soft delete)
      x-speakeasy-mcp:
        name: lucid_delete_passport
        description: Soft-delete a passport by passport_id.
      parameters:
        - in: path
          name: passport_id
          required: true
          schema: { type: string }
        - in: header
          name: X-Owner-Address
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, deleted]
                properties:
                  success: { type: boolean }
                  deleted: { type: boolean }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/passports/{passport_id}/sync:
    post:
      tags: [Passports]
      operationId: lucid_trigger_passport_sync
      summary: Trigger on-chain sync for a passport
      x-speakeasy-mcp:
        name: lucid_trigger_passport_sync
        description: Trigger on-chain sync for a passport.
      parameters:
        - in: path
          name: passport_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean }
                  on_chain_pda: { type: string, nullable: true }
                  on_chain_tx: { type: string, nullable: true }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/passports/pending-sync:
    get:
      tags: [Passports]
      operationId: lucid_list_passports_pending_sync
      summary: Get passports pending sync
      x-speakeasy-mcp:
        name: lucid_list_passports_pending_sync
        description: List passports that are pending on-chain sync.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, count, passports]
                properties:
                  success: { type: boolean }
                  count: { type: integer }
                  passports:
                    type: array
                    items: { $ref: '#/components/schemas/Passport' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/passports/stats:
    get:
      tags: [Passports]
      operationId: lucid_get_passport_stats
      summary: Passport statistics
      x-speakeasy-mcp:
        name: lucid_get_passport_stats
        description: Get passport statistics.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportStatsResponse'
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ===========================================================================
  # Share Tokens
  # ===========================================================================
  /v1/passports/{passport_id}/token/launch:
    post:
      tags: [Shares]
      operationId: lucid_launch_share_token
      summary: Launch a share token for a passport
      x-speakeasy-mcp:
        name: lucid_launch_share_token
        description: Create and launch a share token (SPL) for fractional ownership of a passport.
      parameters:
        - in: path
          name: passport_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenLaunchRequest'
      responses:
        '201':
          description: Token launched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenLaunchResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/passports/{passport_id}/token:
    get:
      tags: [Shares]
      operationId: lucid_get_share_token
      summary: Get share token info for a passport
      x-speakeasy-mcp:
        name: lucid_get_share_token
        description: Get token info (mint, supply, holders) for a passport's share token.
      parameters:
        - in: path
          name: passport_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenInfo'
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/passports/{passport_id}/token/airdrop:
    post:
      tags: [Shares]
      operationId: lucid_trigger_revenue_airdrop
      summary: Trigger revenue airdrop for share token holders
      x-speakeasy-mcp:
        name: lucid_trigger_revenue_airdrop
        description: Snapshot token holders and distribute SOL proportionally based on holdings.
      parameters:
        - in: path
          name: passport_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirdropRequest'
      responses:
        '200':
          description: Airdrop executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirdropResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/models:
    get:
      tags: [Passports]
      operationId: lucid_search_models
      summary: Search model passports
      x-speakeasy-mcp:
        name: lucid_search_models
        description: Search model passports (ModelMeta filters).
      parameters:
        - in: query
          name: runtime
          schema: { type: string }
        - in: query
          name: format
          schema: { type: string }
        - in: query
          name: max_vram
          schema: { type: integer }
        - in: query
          name: available
          description: "Tri-state filter: 'true' returns only models that can serve inference (healthy compute or API-hosted), 'false' returns only unavailable models (missing compute), omit for all models"
          schema: { type: string, enum: ['true', 'false'] }
        - in: query
          name: owner
          schema: { type: string }
        - in: query
          name: tags
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, models, pagination]
                properties:
                  success: { type: boolean }
                  models:
                    type: array
                    items: { $ref: '#/components/schemas/Passport' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/compute:
    get:
      tags: [Compute]
      operationId: lucid_search_compute
      summary: Search compute passports
      x-speakeasy-mcp:
        name: lucid_search_compute
        description: Search compute passports (ComputeMeta filters).
      parameters:
        - in: query
          name: regions
          schema: { type: string }
        - in: query
          name: runtimes
          schema: { type: string }
        - in: query
          name: provider_type
          schema: { type: string }
        - in: query
          name: min_vram
          schema: { type: integer }
        - in: query
          name: gpu
          schema: { type: string }
        - in: query
          name: owner
          schema: { type: string }
        - in: query
          name: tags
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, compute, pagination]
                properties:
                  success: { type: boolean }
                  compute:
                    type: array
                    items: { $ref: '#/components/schemas/Passport' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/tools:
    get:
      tags: [Passports]
      operationId: lucid_list_tools
      summary: List tool passports
      x-speakeasy-mcp:
        name: lucid_list_tools
        description: List active tool passports with optional filtering.
      parameters:
        - in: query
          name: owner
          schema: { type: string }
        - in: query
          name: tags
          description: Comma-separated
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, tools, pagination]
                properties:
                  success: { type: boolean }
                  tools:
                    type: array
                    items: { $ref: '#/components/schemas/Passport' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/datasets:
    get:
      tags: [Passports]
      operationId: lucid_list_datasets
      summary: List dataset passports
      x-speakeasy-mcp:
        name: lucid_list_datasets
        description: List active dataset passports with optional filtering.
      parameters:
        - in: query
          name: owner
          schema: { type: string }
        - in: query
          name: tags
          description: Comma-separated
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, datasets, pagination]
                properties:
                  success: { type: boolean }
                  datasets:
                    type: array
                    items: { $ref: '#/components/schemas/Passport' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/agents:
    get:
      tags: [Passports]
      operationId: lucid_list_agent_passports
      summary: List agent passports
      x-speakeasy-mcp:
        name: lucid_list_agent_passports
        description: List active agent passports with optional filtering.
      parameters:
        - in: query
          name: owner
          schema: { type: string }
        - in: query
          name: tags
          description: Comma-separated
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, agents, pagination]
                properties:
                  success: { type: boolean }
                  agents:
                    type: array
                    items: { $ref: '#/components/schemas/Passport' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ===========================================================================
  # Match
  # ===========================================================================
  /v1/match/explain:
    post:
      tags: [Match]
      operationId: lucid_match_explain
      summary: Evaluate policy against compute/model meta
      x-speakeasy-mcp:
        name: lucid_match_explain
        description: Evaluate a policy against compute & model metadata and explain the decision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy: { $ref: '#/components/schemas/Policy' }
                compute_meta: { $ref: '#/components/schemas/ComputeMeta' }
                model_meta: { $ref: '#/components/schemas/ModelMeta' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, allowed, reasons, policy_hash]
                properties:
                  success: { type: boolean }
                  allowed: { type: boolean }
                  reasons:
                    type: array
                    items: { type: string }
                  policy_hash: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/match:
    post:
      tags: [Match]
      operationId: lucid_match
      summary: Match compute for model
      x-speakeasy-mcp:
        name: lucid_match
        description: Match compute for a model given a compute catalog and policy constraints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model_meta: { $ref: '#/components/schemas/ModelMeta' }
                policy: { $ref: '#/components/schemas/Policy' }
                compute_catalog:
                  type: array
                  items: { $ref: '#/components/schemas/ComputeMeta' }
                require_live_healthy: { type: boolean, default: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, match, explain]
                properties:
                  success: { type: boolean }
                  match: { type: object, additionalProperties: true }
                  explain: { type: object, additionalProperties: true }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/route:
    post:
      tags: [Match]
      operationId: lucid_route
      summary: Plan a route (match + resolve endpoint)
      x-speakeasy-mcp:
        name: lucid_route
        description: Match + resolve an executable inference endpoint for a model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model_meta: { $ref: '#/components/schemas/ModelMeta' }
                policy: { $ref: '#/components/schemas/Policy' }
                compute_catalog:
                  type: array
                  items: { $ref: '#/components/schemas/ComputeMeta' }
                request_id: { type: string }
                require_live_healthy: { type: boolean, default: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, route, explain]
                properties:
                  success: { type: boolean }
                  request_id: { type: string }
                  route:
                    type: object
                    properties:
                      compute_passport_id: { type: string }
                      model_passport_id: { type: string }
                      endpoint: { type: string }
                      runtime: { type: string }
                      policy_hash: { type: string }
                      fallbacks:
                        type: array
                        items: { type: object, additionalProperties: true }
                  explain: { type: object, additionalProperties: true }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ===========================================================================
  # Run / Inference
  # ===========================================================================
  /v1/run/inference:
    post:
      tags: [Run]
      operationId: lucid_run_inference
      summary: Run inference (optionally streaming via SSE)
      x-speakeasy-mcp:
        name: lucid_run_inference
        description: |
          Run inference through LucidLayer.
          NOTE: streaming responses may not be supported by all MCP clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
      responses:
        '200':
          description: Non-streaming inference result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceResult'
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/chat/completions:
    post:
      tags: [Run]
      operationId: lucid_chat_completions
      summary: OpenAI-compatible chat completions
      x-speakeasy-mcp:
        name: lucid_chat_completions
        description: OpenAI-compatible chat completions routed through LucidLayer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ===========================================================================
  # Compute live-state
  # ===========================================================================
  /v1/compute/nodes/heartbeat:
    post:
      tags: [Compute]
      operationId: lucid_heartbeat
      summary: Submit compute node heartbeat
      x-speakeasy-mcp:
        name: lucid_heartbeat
        description: Submit a compute node heartbeat to update live state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeHeartbeat'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  state: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/compute/nodes/{computePassportId}/health:
    get:
      tags: [Compute]
      operationId: lucid_get_health
      summary: Get compute node health
      x-speakeasy-mcp:
        name: lucid_get_health
        description: Get the current health state of a compute node.
      parameters:
        - in: path
          name: computePassportId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  state: { type: object, additionalProperties: true }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ===========================================================================
  # Receipts
  # ===========================================================================
  /v1/receipts:
    post:
      tags: [Receipts]
      operationId: lucid_create_receipt
      summary: Create a receipt
      x-speakeasy-mcp:
        name: lucid_create_receipt
        description: Create a receipt and append it to the receipt MMR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReceiptRequest'
      responses:
