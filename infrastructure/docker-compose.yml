services:
  # Redis (for Nango token caching)
  redis:
    image: redis:7-alpine
    container_name: lucid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lucid-oauth-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nango OAuth Server (connecting to Cloud Supabase)
  nango:
    image: nangohq/nango-server:latest
    container_name: lucid-nango
    restart: unless-stopped
    ports:
      - "3003:3003"  # API
      - "3007:3007"  # Dashboard
    environment:
      SERVER_PORT: 3003
      NANGO_DB_HOST: aws-1-eu-north-1.pooler.supabase.com
      NANGO_DB_PORT: 6543
      NANGO_DB_NAME: postgres
      NANGO_DB_USER: postgres.kwihlcnapmkaivijyiif
      NANGO_DB_PASSWORD: Tk5JbpMcX!qdEvE
      NANGO_ENCRYPTION_KEY: ${NANGO_ENCRYPTION_KEY}
      NANGO_SECRET_KEY: ${NANGO_SECRET_KEY}
      NANGO_CALLBACK_URL: ${NANGO_CALLBACK_URL:-http://localhost:3001/api/oauth/callback}
      SERVER_RUN_MODE: DOCKERIZED
      TELEMETRY_SDK: "false"
    volumes:
      - nango_data:/var/lib/nango
    networks:
      - lucid-oauth-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Traefik Reverse Proxy with SSL
  traefik:
    image: traefik:v2.10
    container_name: lucid-traefik
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
      - "8080:8080" # Dashboard
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/traefik:/var/log/traefik
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lucid-oauth-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nango_data:
    driver: local
  redis_data:
    driver: local

networks:
  lucid-oauth-network:
    driver: bridge
