services:
  agent:
    build: .
    container_name: lucid-agent-deploy_ba9190ef77cb
    ports:
      - "3100:3100"
    environment:
      - TRUSTGATE_URL=
      - TRUSTGATE_API_KEY=
      - MCPGATE_URL=
      - MCPGATE_API_KEY=
      - PORT=3100
      - AGENT_PASSPORT_ID=passport_1
    restart: on-failure
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30000ms
      timeout: 5s
      retries: 3
    labels:
      - "lucid.passport_id=passport_1"
      - "lucid.deployment_id=deploy_ba9190ef77cb"
