services:
  agent:
    build: .
    container_name: lucid-agent-deploy_d2ad5d421b16
    ports:
      - "3100:3100"
    environment:
      - MCPGATE_URL=
      - MCPGATE_API_KEY=
      - PORT=3100
      - AGENT_PASSPORT_ID=passport_new_agent_123
    restart: on-failure
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30000ms
      timeout: 5s
      retries: 3
    labels:
      - "lucid.passport_id=passport_new_agent_123"
      - "lucid.deployment_id=deploy_d2ad5d421b16"
