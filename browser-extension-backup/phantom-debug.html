<!DOCTYPE html>
<html>
<head>
    <title>Phantom Detection Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-box { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Phantom Wallet Detection Debug</h1>
    
    <div class="debug-box info">
        <strong>This page helps debug Phantom wallet detection issues.</strong><br>
        Use this when your extension shows "Phantom not found" but you have Phantom installed.
    </div>

    <div id="detection-results">
        <h3>Detection Results:</h3>
        <div id="results"></div>
    </div>

    <div>
        <button onclick="checkPhantom()">🔍 Check Phantom Now</button>
        <button onclick="testConnection()">🔗 Test Connection</button>
        <button onclick="clearResults()">🧹 Clear Results</button>
    </div>

    <div class="debug-box">
        <h3>Manual Checks:</h3>
        <div id="manual-checks"></div>
    </div>

    <script>
        let checkCount = 0;

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `debug-box ${type}`;
            div.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            results.appendChild(div);
            console.log(message);
        }

        function checkPhantom() {
            checkCount++;
            log(`🔍 Detection Check #${checkCount}`, 'info');
            
            // Basic checks
            const hasWindow = typeof window !== 'undefined';
            const hasSolana = typeof window.solana !== 'undefined';
            const hasIsPhantom = hasSolana && typeof window.solana.isPhantom !== 'undefined';
            const isPhantomTrue = hasIsPhantom && window.solana.isPhantom === true;
            
            log(`✅ Window object: ${hasWindow}`, hasWindow ? 'success' : 'error');
            log(`✅ window.solana exists: ${hasSolana}`, hasSolana ? 'success' : 'error');
            log(`✅ window.solana.isPhantom exists: ${hasIsPhantom}`, hasIsPhantom ? 'success' : 'error');
            log(`✅ window.solana.isPhantom === true: ${isPhantomTrue}`, isPhantomTrue ? 'success' : 'error');
            
            if (hasSolana) {
                const solanaKeys = Object.keys(window.solana);
                log(`🔑 window.solana keys: ${solanaKeys.join(', ')}`, 'info');
                log(`📋 window.solana.isPhantom value: ${window.solana.isPhantom}`, 'info');
                log(`🔗 window.solana.isConnected: ${window.solana.isConnected}`, 'info');
                
                if (window.solana.publicKey) {
                    log(`🔑 Current publicKey: ${window.solana.publicKey.toString()}`, 'success');
                }
            } else {
                log(`❌ window.solana is not available. Phantom may not be installed or injected yet.`, 'error');
                
                // Check if it's a timing issue
                setTimeout(() => {
                    log(`⏰ Rechecking after 2 seconds...`, 'info');
                    checkPhantom();
                }, 2000);
            }
            
            updateManualChecks();
        }

        function updateManualChecks() {
            const manual = document.getElementById('manual-checks');
            manual.innerHTML = `
                <p><strong>window.solana:</strong> ${typeof window.solana}</p>
                <p><strong>window.solana object:</strong> ${window.solana ? JSON.stringify(window.solana, null, 2) : 'undefined'}</p>
                <p><strong>Phantom extensions in page:</strong> ${document.querySelectorAll('[data-phantom]').length} elements found</p>
                <p><strong>Page URL:</strong> ${location.href}</p>
                <p><strong>Page protocol:</strong> ${location.protocol}</p>
            `;
        }

        async function testConnection() {
            log(`🔗 Testing Phantom connection...`, 'info');
            
            try {
                if (!window.solana || !window.solana.isPhantom) {
                    throw new Error('Phantom not detected');
                }
                
                log(`📞 Calling window.solana.connect()...`, 'info');
                const response = await window.solana.connect();
                
                log(`✅ Connection successful!`, 'success');
                log(`🔑 Public Key: ${response.publicKey.toString()}`, 'success');
                
            } catch (error) {
                log(`❌ Connection failed: ${error.message}`, 'error');
                
                if (error.message.includes('User rejected')) {
                    log(`ℹ️ This means Phantom appeared but user cancelled`, 'info');
                } else {
                    log(`ℹ️ This means Phantom detection failed`, 'error');
                }
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            checkCount = 0;
        }

        // Auto-run initial check
        window.addEventListener('load', () => {
            setTimeout(() => {
                log(`🚀 Page loaded, starting automatic Phantom detection...`, 'info');
                checkPhantom();
            }, 500);
        });

        // Check periodically for Phantom injection
        let autoCheckInterval = setInterval(() => {
            if (window.solana && window.solana.isPhantom) {
                log(`👻 Phantom auto-detected!`, 'success');
                clearInterval(autoCheckInterval);
            }
        }, 1000);

        // Stop auto-checking after 10 seconds
        setTimeout(() => {
            clearInterval(autoCheckInterval);
            log(`⏰ Stopped auto-checking for Phantom`, 'info');
        }, 10000);
    </script>
</body>
</html>
