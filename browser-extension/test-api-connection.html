<!DOCTYPE html>
<html>
<head>
    <title>Test API Connection</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #1a1a1a; color: white; }
        .success { color: #4ade80; }
        .error { color: #ef4444; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        pre { background: #2a2a2a; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Lucid L2 API Connection Test</h1>
    <p>Testing connection to WSL backend: <code>http://172.28.35.139:3001</code></p>
    
    <button onclick="testConnection()">Test API Connection</button>
    <button onclick="testPrivy()">Test Privy Bridge</button>
    
    <div id="results"></div>

    <script>
        async function testConnection() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing API connection...</p>';
            
            try {
                const response = await fetch('http://172.28.35.139:3001/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: 'Testing from browser extension',
                        wallet: 'test-wallet'
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                results.innerHTML = `
                    <h3 class="success">✅ API Connection Successful!</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <p><strong>Transaction:</strong> <a href="https://explorer.solana.com/tx/${data.txSignature}?cluster=devnet" target="_blank">${data.txSignature}</a></p>
                `;
                
            } catch (error) {
                results.innerHTML = `
                    <h3 class="error">❌ API Connection Failed</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>Check:</strong></p>
                    <ul>
                        <li>Is the server running? <code>cd offchain && npm start</code></li>
                        <li>Is it listening on 0.0.0.0? Should show WSL IP in logs</li>
                        <li>Are CORS headers enabled?</li>
                    </ul>
                `;
            }
        }

        async function testPrivy() {
            const results = document.getElementById('results');
            
            if (typeof window.privyAPIBridge === 'undefined') {
                results.innerHTML = `
                    <h3 class="error">❌ Privy Bridge Not Found</h3>
                    <p>The Privy API bridge is not loaded. Check if privy-api-bridge.js is included.</p>
                `;
                return;
            }
            
            results.innerHTML = `
                <h3 class="success">✅ Privy Bridge Loaded</h3>
                <p>Bridge URL: ${window.privyAPIBridge.apiUrl}</p>
                <p>Connected: ${window.privyAPIBridge.isWalletConnected()}</p>
                <p>Network Config: ${JSON.stringify(window.privyAPIBridge.getNetworkConfig())}</p>
            `;
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            setTimeout(testPrivy, 1000); // Give time for scripts to load
        });
    </script>
    
    <!-- Load the bridge for testing -->
    <script src="privy-api-bridge.js"></script>
</body>
</html>
