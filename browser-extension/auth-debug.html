<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Privy Debug</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; background: #0b1020; color: #e5e7eb; }
      .log { background: #1f2937; padding: 10px; margin: 10px 0; border-radius: 4px; border-left: 3px solid #676FFF; }
      .error { border-left-color: #ef4444; background: #7f1d1d; }
      .success { border-left-color: #10b981; background: #065f46; }
    </style>
  </head>
  <body>
    <h1>Privy Connection Debug</h1>
    <div id="logs"></div>
    <div id="root"></div>
    
    <script>
      function log(message, type = 'info') {
        console.log(message);
        const logDiv = document.createElement('div');
        logDiv.className = `log ${type}`;
        logDiv.textContent = new Date().toLocaleTimeString() + ': ' + message;
        document.getElementById('logs').appendChild(logDiv);
      }

      function testBasics() {
        log('Testing basic functionality...');
        
        // Test network
        fetch('https://httpbin.org/get')
          .then(() => log('✅ Network connectivity OK', 'success'))
          .catch(e => log('❌ Network failed: ' + e.message, 'error'));

        // Test if we can reach Privy domains
        fetch('https://auth.privy.io', { mode: 'no-cors' })
          .then(() => log('✅ Privy domain reachable', 'success'))
          .catch(e => log('❌ Privy domain failed: ' + e.message, 'error'));
      }

      function testAuthScript() {
        log('Testing auth script loading...');
        
        const script = document.createElement('script');
        script.src = './dist/auth.js';
        
        script.onload = function() {
          log('✅ auth.js loaded successfully', 'success');
          
          // Check if React is available
          if (typeof window.React !== 'undefined') {
            log('✅ React available', 'success');
          } else {
            log('⚠️ React not found in global scope', 'error');
          }
        };
        
        script.onerror = function(e) {
          log('❌ auth.js failed to load', 'error');
          log('Error details: ' + JSON.stringify(e), 'error');
        };
        
        document.head.appendChild(script);
      }

      // Global error handler
      window.onerror = function(message, source, lineno, colno, error) {
        log(`❌ JS Error: ${message} at ${source}:${lineno}`, 'error');
        if (error && error.stack) {
          log('Stack: ' + error.stack, 'error');
        }
      };

      window.onunhandledrejection = function(event) {
        log('❌ Unhandled Promise Rejection: ' + event.reason, 'error');
      };

      // Start tests
      log('Starting diagnostic tests...');
      testBasics();
      
      setTimeout(() => {
        testAuthScript();
      }, 1000);
    </script>
  </body>
</html>
