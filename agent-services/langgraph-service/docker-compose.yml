version: '3.8'

services:
  langgraph-service:
    build: .
    container_name: lucid-langgraph
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TRUSTGATE_URL=${TRUSTGATE_URL:-https://trustgate-api-production.up.railway.app}
      - TRUSTGATE_API_KEY=${TRUSTGATE_API_KEY}
      - LUCID_API_URL=http://host.docker.internal:3001
      - PORT=8083
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lucid-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  lucid-network:
    external: true
    name: n8n_lucid-network
