version: '3.8'

services:
  # Note: These are placeholder services
  # In production, replace with actual MCP server implementations
  # For now, we'll use simple HTTP services that can be called via the MCP protocol
  
  # MCP-compatible services can be added here
  # For this phase, we'll focus on the registry architecture
  # Actual MCP servers would need specific implementations

  # Placeholder for Twitter MCP Server
  mcp-twitter-placeholder:
    image: nginx:alpine
    container_name: lucid-mcp-twitter
    ports:
      - "9001:80"
    networks:
      - lucid-network
    environment:
      - TOOL_NAME=twitter
      - TOOL_TYPE=social
    volumes:
      - ./config/twitter-info.json:/usr/share/nginx/html/info.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/info.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Placeholder for IPFS MCP Server
  mcp-ipfs-placeholder:
    image: nginx:alpine
    container_name: lucid-mcp-ipfs
    ports:
      - "9002:80"
    networks:
      - lucid-network
    environment:
      - TOOL_NAME=ipfs
      - TOOL_TYPE=storage
    volumes:
      - ./config/ipfs-info.json:/usr/share/nginx/html/info.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/info.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Placeholder for Solana MCP Server
  mcp-solana-placeholder:
    image: nginx:alpine
    container_name: lucid-mcp-solana
    ports:
      - "9003:80"
    networks:
      - lucid-network
    environment:
      - TOOL_NAME=solana
      - TOOL_TYPE=blockchain
      - RPC_URL=https://api.devnet.solana.com
    volumes:
      - ./config/solana-info.json:/usr/share/nginx/html/info.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/info.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Placeholder for GitHub MCP Server
  mcp-github-placeholder:
    image: nginx:alpine
    container_name: lucid-mcp-github
    ports:
      - "9004:80"
    networks:
      - lucid-network
    environment:
      - TOOL_NAME=github
      - TOOL_TYPE=data
    volumes:
      - ./config/github-info.json:/usr/share/nginx/html/info.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/info.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Placeholder for Web Search MCP Server
  mcp-search-placeholder:
    image: nginx:alpine
    container_name: lucid-mcp-search
    ports:
      - "9005:80"
    networks:
      - lucid-network
    environment:
      - TOOL_NAME=web-search
      - TOOL_TYPE=data
    volumes:
      - ./config/search-info.json:/usr/share/nginx/html/info.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/info.json"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  lucid-network:
    external: true
    name: n8n_lucid-network
