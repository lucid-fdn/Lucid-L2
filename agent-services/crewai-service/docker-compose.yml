version: '3.8'

services:
  crewai-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lucid-crewai-planner
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - PORT=8082
      - HOST=0.0.0.0
    networks:
      - lucid-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  lucid-network:
    name: lucid-network
    driver: bridge
